<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荣耀A2A一周放量数据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 40px 32px;
            background: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #1f2937;
        }
        .container { max-width: 1280px; margin: 0 auto; }

        .header { margin-bottom: 28px; }
        .header h1 {
            font-size: 20px; color: #111827;
            margin: 0 0 6px 0; font-weight: 600;
            letter-spacing: 0.3px;
        }
        .header p { color: #9ca3af; font-size: 13px; margin: 0; }

        .chart-card {
            background: #fff;
            border-radius: 10px;
            padding: 28px 28px 24px;
            margin-bottom: 20px;
            border: 1px solid #eef0f3;
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .card-head-left { min-width: 0; }
        .card-title {
            font-size: 15px; color: #111827;
            font-weight: 600; margin: 0 0 4px 0;
        }
        .card-desc {
            font-size: 12px; color: #9ca3af;
            margin: 0;
        }
        .legend-box {
            display: flex;
            gap: 20px;
            align-items: center;
            padding-top: 4px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #6b7280;
        }
        .legend-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        .row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 240px;
            gap: 24px;
            align-items: stretch;
        }
        .chart { width: 100%; height: 440px; }

        .kpi-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .kpi {
            flex: 1;
            border-radius: 10px;
            padding: 24px 22px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .kpi.primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
        }
        .kpi.secondary {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: #fff;
        }
        .kpi-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 0.4px;
        }
        .kpi-value {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .kpi-unit {
            font-size: 13px;
            font-weight: 500;
            margin-left: 4px;
            opacity: 0.75;
        }
        .kpi-trend {
            margin-top: 10px;
            font-size: 11px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .kpi-deco {
            position: absolute;
            right: -30px; bottom: -30px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .kpi-deco-2 {
            position: absolute;
            right: 24px; top: -32px;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }

        @media (max-width: 880px) {
            body { padding: 24px 16px; }
            .row { grid-template-columns: 1fr; }
            .chart { height: 360px; }
            .kpi-wrap { flex-direction: row; }
            .kpi { min-height: 130px; }
            .card-head { flex-direction: column; }
            .legend-box { flex-wrap: wrap; }
        }
        @media (max-width: 540px) {
            .kpi-wrap { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>荣耀A2A一周放量数据</h1>
        <p>统计周期 · 2025年5月22日 — 5月29日</p>
    </div>

    <div class="chart-card">
        <div class="card-head">
            <div class="card-head-left">
                <p class="card-title">用户增长趋势</p>
                <p class="card-desc">灰度放量 · 每日活跃用户</p>
            </div>
            <div class="legend-box">
                <div class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>灰度放量</div>
                <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>每日活跃用户</div>
            </div>
        </div>
        <div class="row">
            <div id="chart1" class="chart"></div>
            <div class="kpi-wrap">
                <div class="kpi primary">
                    <div class="kpi-deco"></div>
                    <div class="kpi-deco-2"></div>
                    <div class="kpi-label">累计用户总数</div>
                    <div class="kpi-value">13,368<span class="kpi-unit">人</span></div>
                    <div class="kpi-trend">↑ 较昨日 +2,883</div>
                </div>
                <div class="kpi secondary">
                    <div class="kpi-deco"></div>
                    <div class="kpi-deco-2"></div>
                    <div class="kpi-label">累计请求数</div>
                    <div class="kpi-value">19,373<span class="kpi-unit">次</span></div>
                    <div class="kpi-trend">↑ 较昨日 +3,235</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const dates     = ['5/22', '5/23', '5/24', '5/25', '5/26', '5/27', '5/28', '5/29'];
const grayDaily = [52763, 64376, 125000, 120842, 7000000, 8000000, 15000000, 16600000];
const dau       = [2, 6, 11, 44, 253, 361, 647, 880];

const fmtNum = v => v.toLocaleString();
const fmtAxis = v => {
    if (v >= 100000000) return (v/100000000).toFixed(1) + '亿';
    if (v >= 10000)     return (v/10000).toFixed(v >= 1000000 ? 0 : 1) + '万';
    if (v >= 1000)      return (v/1000) + 'k';
    return v;
};

const baseAxis = {
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: '#f1f3f5', type: 'dashed' } }
};

const autoAvoid = { hideOverlap: true, moveOverlap: 'shiftY' };

echarts.init(document.getElementById('chart1')).setOption({
    tooltip: {
        trigger: 'axis',
        axisPointer: {
            type: 'line',
            lineStyle: { color: '#d1d5db', width: 1, type: 'dashed' }
        },
        backgroundColor: 'rgba(255,255,255,0.98)',
        borderColor: '#e5e7eb',
        borderWidth: 1,
        padding: [10, 14],
        textStyle: { color: '#1f2937', fontSize: 12 },
        valueFormatter: fmtNum,
        extraCssText: 'box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-radius: 8px;'
    },
    grid: { left: 12, right: 24, top: 50, bottom: 30, containLabel: true },
    xAxis: {
        type: 'category', data: dates,
        boundaryGap: ['3%', '3%'],
        ...baseAxis,
        splitLine: { show: false },
        axisLabel: { color: '#9ca3af', fontSize: 12, margin: 16 }
    },
    yAxis: [
        {
            type: 'value',
            name: '放量',
            nameTextStyle: { color: '#9ca3af', fontSize: 11, padding: [0, 0, 8, 0] },
            nameGap: 18,
            ...baseAxis,
            axisLabel: { color: '#9ca3af', fontSize: 11, formatter: fmtAxis, margin: 12 }
        },
        {
            type: 'value',
            name: '日活',
            nameTextStyle: { color: '#9ca3af', fontSize: 11, padding: [0, 0, 8, 0] },
            nameGap: 18,
            ...baseAxis,
            splitLine: { show: false },
            axisLabel: { color: '#9ca3af', fontSize: 11, formatter: fmtAxis, margin: 12 }
        }
    ],
    series: [
        {
            name: '灰度放量', type: 'line', yAxisIndex: 0,
            data: grayDaily,
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { width: 2, color: '#60a5fa' },
            itemStyle: { color: '#60a5fa', borderColor: '#fff', borderWidth: 1.5 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(96,165,250,0.28)' },
                    { offset: 1, color: 'rgba(96,165,250,0.02)' }
                ])
            },
            label: {
                show: true, position: 'top', distance: 12,
                fontSize: 11, fontWeight: 500, color: '#3b82f6',
                formatter: p => fmtAxis(p.value)
            },
            labelLayout: autoAvoid,
            emphasis: { scale: 1.6, focus: 'series' },
            z: 2
        },
        {
            name: '每日活跃用户', type: 'line', yAxisIndex: 1,
            data: dau,
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { width: 2, color: '#f59e0b' },
            itemStyle: { color: '#f59e0b', borderColor: '#fff', borderWidth: 1.5 },
            label: {
                show: true, position: 'top', distance: 12,
                fontSize: 11, fontWeight: 500, color: '#d97706',
                formatter: p => fmtNum(p.value)
            },
            labelLayout: autoAvoid,
            emphasis: { scale: 1.6, focus: 'series' },
            z: 3
        }
    ]
});

window.addEventListener('resize', () => {
    const inst = echarts.getInstanceByDom(document.getElementById('chart1'));
    if (inst) inst.resize();
});
</script>
</body>
</html>
